<!DOCTYPE html>
<html lang="en">

<head>
    <base href="/">
    <link href="/assets/vendors/global/vendors.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
    <script src='/lib/webviewer/webviewer.min.js'></script>
    <script src="/lib/jquery/dist/jquery.min.js"></script>
    <script src="/assets/vendors/global/vendors.bundle.js"></script>
    <script src="/lib/sweetalert/dist/sweetalert.min.js"></script>
    <script src="/lib/abp-web-resources/Abp/Framework/scripts/abp.js"></script>
    <script src="/lib/abp-web-resources/Abp/Framework/scripts/libs/abp.jquery.js"></script>
    <script src="/lib/abp-web-resources/Abp/Framework/scripts/libs/abp.sweet-alert.js"></script>
    <script src="/js/extensions.js"></script>
    <script src="/AbpServiceProxies/GetAll"></script>
    <script src="/AbpScripts/GetScripts"></script>
    <title>Document Viewer</title>
</head>

<body style="margin:0; padding:0; overflow:hidden;">
    <div id='viewer' style="margin:0 auto; width: 100%; height: 100vh;" class="w-100 h-100"></div>

    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        
        let pdfUrl = '/api/document/download';
        if (ref) {
            pdfUrl += '?ref=' + ref;
        }

        WebViewer({
            initialDoc: pdfUrl,
            path: '/lib/webviewer/public',
        }, document.getElementById('viewer')).then(instance => {
            // Disable elements to mimic the original view-only restrictions
            instance.UI.disableElements(['contextMenuPopup', 'selectToolButton', 'themeChangeButton', 'languageButton']);
            instance.UI.disableFeatures([instance.UI.Feature.Print, instance.UI.Feature.Download, instance.UI.Feature.PageNavigation, instance.UI.Feature.Search, instance.UI.Feature.TextSelection, instance.UI.Feature.Annotations]);
        });
    </script>
</body>




</html>
