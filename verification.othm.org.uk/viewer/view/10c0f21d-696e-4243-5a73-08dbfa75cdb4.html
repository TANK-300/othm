    <script src='/lib/pdfjs-express-viewer/webviewer.min.js'></script>
    <script src="/lib/jquery/dist/jquery.min.js"></script>
    <script src="/assets/vendors/global/vendors.bundle.js"></script>

    <script src="/AbpScripts/GetScripts"></script>
    <title>Document Viewer</title>
</head>


<body style="margin:0; padding:0; overflow:hidden;">
    <iframe id="viewer" src="https://mozilla.github.io/pdf.js/web/viewer.html?file=" style="width: 100%; height: 100vh; border: none;"></iframe>
    <script type="text/javascript">
        // Pass the reference if we have it to load the correct PDF
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        
        let pdfUrl = window.location.origin + '/viewer/view/view.pdf';
        if (ref) {
            pdfUrl += '?ref=' + ref;
        }
        
        document.getElementById('viewer').src = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + encodeURIComponent(pdfUrl);
    </script>
</body>

</html>
