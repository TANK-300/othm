<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTHM Data Generator</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a5276; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        input:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; word-break: break-all; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .qr-placeholder { display: block; margin: 15px auto; max-width: 200px; }
        .link-text { display: block; text-align: center; margin-top: 10px; font-size: 14px; color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Generate Certificate Data</h2>
        <form id="dataForm">
            <div class="form-group">
                <label for="name">Student Full Name</label>
                <input type="text" id="name" required placeholder="e.g. ZHANG SAN">
            </div>
            
            <div class="form-group">
                <label for="reference">Reference Number</label>
                <input type="text" id="reference" required placeholder="e.g. 12345678-01-ABCD">
            </div>

            <div class="form-group">
                <label for="dateOfAward">Date of Award</label>
                <input type="date" id="dateOfAward" required>
            </div>

            <div class="form-group">
                <label for="qualificationTitle">Qualification Title</label>
                <input type="text" id="qualificationTitle" required placeholder="e.g. OTHM Level 7 Diploma...">
            </div>

            <div class="form-group">
                <label for="issuingBody">Issuing Body</label>
                <input type="text" id="issuingBody" value="OTHM" required>
            </div>

            <button type="submit">Save & Generate Link</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script>
        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value,
                reference: document.getElementById('reference').value,
                dateOfAward: document.getElementById('dateOfAward').value,
                qualificationTitle: document.getElementById('qualificationTitle').value,
                issuingBody: document.getElementById('issuingBody').value
            };

            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                const resultDiv = document.getElementById('result');
                
                if (result.success) {
                    const generatedUrl = `${window.location.origin}/?reference=${data.reference}`;
                    
                    resultDiv.className = 'success';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <strong>Saved Successfully!</strong><br><br>
                        Here is your verification link (you can embed this into the PDF QR code):<br>
                        <a href="${generatedUrl}" target="_blank" class="link-text">${generatedUrl}</a>
                        <canvas id="qrcode" class="qr-placeholder"></canvas>
                    `;
                    
                    QRCode.toCanvas(document.getElementById('qrcode'), generatedUrl, function (error) {
                        if (error) console.error(error)
                    });
                } else {
                    throw new Error(result.error || 'Failed to save');
                }
            } catch (err) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'error';
                resultDiv.style.display = 'block';
                resultDiv.innerText = err.message;
            }
        });
    </script>
</body>
</html>
